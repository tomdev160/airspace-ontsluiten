<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airspace Kaart – CTR Data LVNL</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a3c5e;
      color: #fff;
      padding: 10px 16px;
      font-size: 1.1rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    #map {
      flex: 1;
    }

    #status {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 0.9rem;
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>Airspace Kaart – CTR Data (LVNL)</header>
  <div id="map"></div>
  <div id="status">Laden…</div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/sp1c="
    crossorigin=""
  ></script>

  <script>
    // Initialise the map centred over the Netherlands
    const map = L.map('map').setView([52.3, 5.3], 7);

    // Base tile layer (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    }).addTo(map);

    const statusEl = document.getElementById('status');

    // ArcGIS FeatureServer – layer 15 (CTR)
    const CTR_URL =
      'https://services-eu1.arcgis.com/OtUwzhpKSdeXgRIB/arcgis/rest/services/Airspaces_data/FeatureServer/15/query' +
      '?where=OBJECTID+%3C100000&objectIds=&geometry=&geometryType=esriGeometryEnvelope&inSR=' +
      '&spatialRel=esriSpatialRelIntersects&resultType=none&distance=0.0&units=esriSRUnit_Meter' +
      '&outDistance=&relationParam=&returnGeodetic=false&outFields=&returnGeometry=true' +
      '&returnCentroid=false&returnEnvelope=false&featureEncoding=esriDefault' +
      '&multipatchOption=xyFootprint&maxAllowableOffset=&geometryPrecision=&outSR=' +
      '&defaultSR=&datumTransformation=&applyVCSProjection=false&returnIdsOnly=false' +
      '&returnUniqueIdsOnly=false&returnCountOnly=false&returnExtentOnly=false' +
      '&returnQueryGeometry=false&returnDistinctValues=false&cacheHint=false&collation=' +
      '&orderByFields=&groupByFieldsForStatistics=&returnAggIds=false&outStatistics=' +
      '&having=&resultOffset=&resultRecordCount=&returnZ=false&returnM=false' +
      '&returnTrueCurves=false&returnExceededLimitFeatures=true&quantizationParameters=' +
      '&sqlFormat=none&f=pjson&token=';

    // Convert Esri pjson geometry to GeoJSON geometry
    function esriGeometryToGeoJSON(geometry) {
      if (!geometry) return null;
      if (geometry.rings) {
        return { type: 'Polygon', coordinates: geometry.rings };
      }
      if (geometry.paths) {
        return { type: 'MultiLineString', coordinates: geometry.paths };
      }
      if (geometry.x !== undefined) {
        return { type: 'Point', coordinates: [geometry.x, geometry.y] };
      }
      return null;
    }

    // Convert Esri pjson FeatureSet to GeoJSON FeatureCollection
    function esriToGeoJSON(data) {
      const features = (data.features || []).map((f) => ({
        type: 'Feature',
        geometry: esriGeometryToGeoJSON(f.geometry),
        properties: f.attributes || {},
      }));
      return { type: 'FeatureCollection', features };
    }

    fetch(CTR_URL)
      .then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} – ${response.statusText}`);
        }
        return response.json();
      })
      .then((data) => {
        const geojson = esriToGeoJSON(data);
        if (!geojson.features || geojson.features.length === 0) {
          statusEl.textContent = 'Geen CTR-data gevonden.';
          return;
        }

        const ctrLayer = L.geoJSON(geojson, {
          style: {
            color: '#c0392b',
            weight: 2,
            opacity: 0.9,
            fillColor: '#e74c3c',
            fillOpacity: 0.15,
          },
          onEachFeature: (feature, layer) => {
            const props = feature.properties || {};
            const name = props.Name || props.name || props.NAME || 'CTR';
            const lower = props.Lower_limit ?? props.lower_limit ?? '–';
            const upper = props.Upper_limit ?? props.upper_limit ?? '–';
            layer.bindPopup(
              `<strong>${name}</strong><br/>
               Ondergrens: ${lower}<br/>
               Bovengrens: ${upper}`
            );
          },
        }).addTo(map);

        // Zoom to the extent of the loaded features
        map.fitBounds(ctrLayer.getBounds());

        statusEl.textContent = `${geojson.features.length} CTR-gebied(en) geladen.`;
        setTimeout(() => statusEl.remove(), 4000);
      })
      .catch((err) => {
        console.error('Fout bij ophalen van CTR-data:', err);
        statusEl.textContent = `Fout: ${err.message}`;
      });
  </script>
</body>
</html>
